schema_version: 1

context:
  name: pinecone
  version: 8.0.1

recipe:
  name: ${{ name|lower }}-split
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/p/pinecone/pinecone-${{ version }}.tar.gz
  sha256: 0e9444f10ceee87e351b0cd37cb2b22d507ca09544c37c07e81b3b4d99fd0eba

build:
  number: 1

outputs:
  - package:
      name: ${{ name }}
    build:
      noarch: python
      script:
        - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }}
        - typing_extensions >=3.7.4
        - certifi >=2019.11.17
        - orjson >=3.0.0
        - pinecone-plugin-interface >=0.0.7,<0.1.0
        - python-dateutil >=2.5.3
        - pinecone-plugin-assistant >=3.0.1,<4.0.0
        # most restrictive
        - urllib3 >=1.26.5
    tests:
      - python:
          imports:
            - pinecone
          pip_check: true
          python_version: ${{ python_min }}.*
  - package:
      name: ${{ name }}-with-grpc
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage(name, upper_bound='x.x.x.x.x.x') }}
        # most restrictive
        - grpcio >=1.68.0
        - googleapis-common-protos >=1.72.0
        - lz4 >=3.1.3
        - protobuf >=6.33.0,<7.0.0
        - protoc-gen-openapiv2 >=0.0.1,<0.1.0
    tests:
      - python:
          imports:
            - pinecone
          pip_check: true
          python_version: ${{ python_min }}.*
  - package:
      name: ${{ name }}-with-asyncio
    build:
      noarch: python
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage(name, upper_bound='x.x.x.x.x.x') }}
        - aiohttp >=3.9.0
        - aiohttp-retry >=2.9.1,<3.0.0
    tests:
      - python:
          imports:
            - pinecone
          pip_check: true
          python_version: ${{ python_min }}.*

about:
  summary: Pinecone client and SDK
  license: Apache-2.0
  license_file: LICENSE.txt
  homepage: https://www.pinecone.io
  repository: https://github.com/pinecone-io/pinecone-python-client
  documentation: https://docs.pinecone.io/guides/get-started/overview

extra:
  recipe-maintainers:
    - isuruf
    - xylar
